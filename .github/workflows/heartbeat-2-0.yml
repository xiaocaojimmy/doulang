name: Heartbeat 2.0 - Autonomous Loop

on:
  schedule:
    # 每20分钟运行一次
    - cron: '*/20 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  heartbeat:
    runs-on: self-hosted  # 在豆哥的电脑上运行
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run Heartbeat 2.0
      run: |
        python scripts/heartbeat_2_0.py
        
    - name: Commit any changes
      run: |
        git config --local user.email "bot@doutech.tech"
        git config --local user.name "DouBot"
        git add -A
        git diff --staged --quiet || git commit -m "Autonomous update: $(date +'%Y-%m-%d %H:%M')"
        git push || true
